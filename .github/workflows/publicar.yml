name: Publicar Hera - Cráneo Noble

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Leer estado de campaña
        id: estado
        run: |
          echo "day=$(python3 -c 'import json; print(json.load(open(\".campana-state.json\"))[\"currentDay\"])')" >> $GITHUB_OUTPUT

      - name: Publicar en Facebook
        if: steps.estado.outputs.day < 8
        env:
          PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          PAGE_ID: "1237040242820189"
          DAY: ${{ steps.estado.outputs.day }}
        run: |
          DAY_DIR="contenido/dia${DAY}"
          IMAGE=$(ls "$DAY_DIR" 2>/dev/null | grep -iE '\.(png|jpg|jpeg|webp)$' | head -1)
          
          python3 -c "
import re, sys
day = int('${DAY}')
with open('marketing/campana-hera.md') as f:
    content = f.read()
marker = f'### Día {day} —'
start = content.find(marker)
if start == -1: sys.exit(1)
section = content[start:]
end = section.find('### Día ', 10)
text = section[:end] if end != -1 else section
match = re.search(r'\*\*Copy:\*\*\n([\s\S]*?)(?=\n#|\$)', text)
if match:
    with open('_copy.txt', 'w') as out:
        out.write(match.group(1).strip())
else:
    sys.exit(1)
"
          
          echo "Día: ${DAY}"
          echo "Imagen: ${IMAGE}"
          
          if [ -n "$IMAGE" ] && [ -f "${DAY_DIR}/${IMAGE}" ]; then
            curl -s -X POST "https://graph.facebook.com/v19.0/${PAGE_ID}/photos" \
              -F "message=$(cat _copy.txt)" \
              -F "access_token=${PAGE_TOKEN}" \
              -F "source=@${DAY_DIR}/${IMAGE}" > fb_result.json
          else
            curl -s -X POST "https://graph.facebook.com/v19.0/${PAGE_ID}/feed" \
              -d "message=$(cat _copy.txt)" \
              -d "access_token=${PAGE_TOKEN}" > fb_result.json
          fi
          
          cat fb_result.json
          python3 -c "import json; d=json.load(open('fb_result.json')); print('✅ OK' if 'id' in d else '❌ ' + d.get('error',{}).get('message',''))"

      - name: Actualizar estado
        if: steps.estado.outputs.day < 8
        run: |
          python3 -c "
import json
with open('.campana-state.json') as f:
    s = json.load(f)
s['publishedDays'].append(s['currentDay'])
s['currentDay'] += 1
with open('.campana-state.json', 'w') as f:
    json.dump(s, f, indent=2)
print(f'Día actualizado a {s[\"currentDay\"]}')
"
          git config user.name "Cráneo Noble Bot"
          git config user.email "bot@craneonoble.com"
          git add .campana-state.json
          git diff --cached --quiet || git commit -m "📅 Campaña Hera: día ${{ steps.estado.outputs.day }} publicado"
          git push

      - name: Campaña completada
        if: steps.estado.outputs.day >= 8
        run: echo "✅ Campaña completada"
